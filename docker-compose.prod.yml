# Production overrides - use with: docker-compose -f docker-compose.base.yml -f docker-compose.prod.yml up
services:
  app:
    image: podkeep:latest
    volumes:
      - podcast-storage:/var/www/html/storage
      - podcast-logs:/var/www/html/storage/logs
    expose:
      - "9000"
    networks:
      - traefik_web

  webserver:
    networks:
      - traefik_web
      - podcast-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.podcast.rule=Host(`podkeep.app`)"
      - "traefik.http.routers.podcast.entrypoints=websecure"
      - "traefik.http.routers.podcast.tls=true"
      - "traefik.http.routers.podcast.tls.certresolver=leresolver"
      - "traefik.http.routers.podcast.tls.domains[0].main=podkeep.app"
      - "traefik.http.services.podcast.loadbalancer.server.port=80"
      - "traefik.http.routers.podcast-http.rule=Host(`podkeep.app`)"
      - "traefik.http.routers.podcast-http.entrypoints=web"
      - "traefik.http.routers.podcast-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    volumes:
      - podcast-public:/var/www/html/public:ro
    container_name: podcast-feed-webserver

networks:
  traefik_web:
    external: true

volumes:
  podcast-storage:
    driver: local
  podcast-logs:
    driver: local
  podcast-public:
    driver: local
