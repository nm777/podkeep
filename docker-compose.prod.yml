services:
  app:
    build:
      context: .
      target: app
    image: podkeep-app:latest
    hostname: podkeep-app
    restart: unless-stopped
    environment:
      - PHP_FPM_LISTEN=0.0.0.0:9000
    volumes:
      - podcast-storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app

  web:
    build:
      context: .
      target: web
    image: podkeep-web:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - app
      - traefik_web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.podcast.rule=Host(`${APP_HOST:-podkeep.app}`)"
      - "traefik.http.routers.podcast.entrypoints=websecure"
      - "traefik.http.routers.podcast.tls=true"
      - "traefik.http.routers.podcast.tls.certresolver=leresolver"
      - "traefik.http.services.podcast.loadbalancer.server.port=80"
      - "traefik.http.routers.podcast-http.rule=Host(`${APP_HOST:-podkeep.app}`)"
      - "traefik.http.routers.podcast-http.entrypoints=web"
      - "traefik.http.routers.podcast-http.middlewares=redirect-to-https,rate-limit"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.rate-limit.ratelimit.average=30"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=50"

  worker:
    image: podkeep-app:latest
    hostname: podkeep-worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - podcast-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app

networks:
  app:
    driver: bridge
  traefik_web:
    external: true

volumes:
  podcast-storage:
    driver: local
