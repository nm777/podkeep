services:
  app:
    build:
      context: .
      target: dev
    hostname: podkeep-app
    volumes:
      - ./src:/var/www/html
    environment:
      - PHP_FPM_LISTEN=0.0.0.0:9000
    networks:
      - app

  web:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src:/var/www/html:ro
    depends_on:
      - app
    networks:
      - app

  worker:
    build:
      context: .
      target: dev
    hostname: podkeep-worker
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./src:/var/www/html
    networks:
      - app

networks:
  app:
    driver: bridge
