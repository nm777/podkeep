# Base configuration - works for both dev and production
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    hostname: podkeep-app
    restart: unless-stopped
    working_dir: /var/www/html
    expose:
      - 9000
    networks:
      - app
    environment:
      - PHP_FPM_LISTEN=${PHP_FPM_LISTEN:-0.0.0.0:9000}

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: web
    image: podkeep-web
    restart: unless-stopped
    networks:
      - app
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  worker:
    image: podkeep-app
    hostname: podkeep-worker
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    networks:
      - app

networks:
  app:
    driver: bridge
