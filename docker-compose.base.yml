# Base configuration - works for both dev and production
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    hostname: podkeep-app
    restart: unless-stopped
    working_dir: /var/www/html
    networks:
      - podcast-network
    environment:
      - PHP_FPM_LISTEN=${PHP_FPM_LISTEN:-0.0.0.0:9000}

  webserver:
    image: nginx:alpine
    restart: unless-stopped
    networks:
      - podcast-network
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

networks:
  podcast-network:
    driver: bridge
